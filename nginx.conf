server {
    listen 80 default_server;
    server_name restart-labs.devera.cloud;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Cache para assets con hash (JS/CSS del build de Docusaurus)
    location ~* \.(js|css|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cache moderado para imágenes
    location ~* \.(png|jpg|jpeg|gif|svg|ico|webp)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # SPA routing — todas las rutas sirven index.html
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }
}
