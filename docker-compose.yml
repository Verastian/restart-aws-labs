services:
  docs:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: restart-labs-docs
    ports:
      - "8080:80"
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - nginx-proxy

networks:
  nginx-proxy:
    external: true
